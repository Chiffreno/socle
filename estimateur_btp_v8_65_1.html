<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimateur BTP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=ranade@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ede9e2;--bg2:#faf9f7;--bg3:#f2efe9;--bg4:#e4e0d8;
  --border:#d8d4cc;--border2:#c4c0b8;
  --text:#0f0f0d;--text2:#58554f;--text3:#9a9690;
  --accent:#4d7a60;--accent2:#3a6149;
  --green:#4a8c5c;--red:#b05050;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:212px;min-width:212px;background:var(--bg2);border-right:1px solid var(--border);box-shadow:2px 0 12px rgba(0,0,0,.07);display:flex;flex-direction:column;overflow:hidden;z-index:1}
.brand{padding:14px 14px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center}
.brand-logo{font-family:'Ranade',var(--sans);font-size:26px;font-weight:700;line-height:1;letter-spacing:-.01em}
.brand-logo .chiff{color:var(--text)}
.brand-logo .reno{color:#C8A96E}
.brand-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.proj-row{padding:7px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.proj-row label{font-size:9px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.proj-row input[type=text]{flex:1;min-width:0;font-family:var(--sans);font-size:11px;background:transparent;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:1px 0;color:var(--text)}
.proj-row input[type=text]:focus{outline:none;border-bottom-color:var(--accent)}
.params-row{padding:7px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
.surf-part{display:flex;align-items:center;gap:5px;flex-shrink:0}
.surf-part label{font-size:9px;color:var(--text2);font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.surf-part span{font-size:9px;color:var(--text3);font-family:var(--mono)}
.tva-part{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tva-seg{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.tva-seg button{padding:2px 7px;font-size:9px;font-family:var(--mono);background:transparent;border:none;color:var(--text2);cursor:pointer;border-right:1px solid var(--border2);transition:all .1s}
.tva-seg button:last-child{border-right:none}
.tva-seg button.on{background:var(--bg4);color:var(--text);font-weight:500}
.nav-scroll{flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:var(--bg3)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.nav-item.disabled{opacity:.32}
.nav-num{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:15px;flex-shrink:0}
.nav-info{flex:1;min-width:0}
.nav-label{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.nav-amount{font-family:var(--mono);font-size:10px;color:var(--text2);text-align:right;min-width:46px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.lot-header{padding:10px 16px 9px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;row-gap:5px}
.lot-sw-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:140px;cursor:pointer;user-select:none}
.lot-sw-wrap:hover .lot-sw{border-color:var(--accent)}
.lot-sw{width:32px;height:18px;border-radius:9px;background:var(--bg4);border:1px solid var(--border2);position:relative;flex-shrink:0;transition:all .18s}
.lot-sw.on{background:var(--accent);border-color:var(--accent2)}
.lot-sw::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--text3);top:2px;left:2px;transition:transform .18s}
.lot-sw.on::after{transform:translateX(14px);background:var(--bg2)}
.lot-title{min-width:0;transition:opacity .15s}
.lot-sw-wrap.off .lot-title{opacity:.38}
.lot-title h2{font-size:14px;font-weight:400;letter-spacing:-.01em}
.lot-title p{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.surf-group{display:flex;align-items:center;gap:5px}
.surf-group label{font-size:9px;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.surf-group span{font-size:9px;color:var(--text3);font-family:var(--mono)}
.quality-seg{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden;flex-shrink:0}
.quality-seg button{padding:3px 9px;font-size:10px;font-family:var(--mono);background:transparent;border:none;color:var(--text2);cursor:pointer;border-right:1px solid var(--border2);transition:all .12s;white-space:nowrap}
.quality-seg button:last-child{border-right:none}
.quality-seg button.active{background:var(--accent);color:#fff;font-weight:500}
.quality-seg button:not(.active):hover{background:var(--bg4);color:var(--text)}
.hdr-btn{padding:3px 8px;font-size:10px;font-family:var(--mono);background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.hdr-btn:hover{color:var(--text2)}
.hdr-btn.active-lot{border-color:var(--green);color:var(--green)}
.config-box{flex-shrink:0;border-bottom:1px solid var(--border)}
.config-head{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--accent);cursor:pointer;user-select:none;transition:background .13s}
.config-head:hover{background:var(--accent2)}
.config-head .ch-title{flex:1;font-family:var(--sans);font-size:12px;font-weight:600;color:#fff;letter-spacing:-0.01em}
.config-head .ch-chevron{color:#fff;font-size:14px;line-height:1;transition:transform .15s;flex-shrink:0;display:inline-flex}
.config-box.collapsed .ch-chevron{transform:rotate(-90deg)}
.config-head .ch-hint{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7);margin-right:4px}
.lot-options{padding:7px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;flex-wrap:wrap;gap:6px 12px;flex-shrink:0;min-height:32px}
.config-box.collapsed .lot-options{display:none}
.opt-group{display:flex;align-items:center;gap:5px}
.opt-group>label{font-size:9px;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.mini-seg{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.mini-seg button{padding:2px 6px;font-size:9px;font-family:var(--mono);background:transparent;border:none;color:var(--text2);cursor:pointer;border-right:1px solid var(--border2);transition:all .1s;white-space:nowrap}
.mini-seg button:last-child{border-right:none}
.mini-seg button.on{background:var(--bg4);color:var(--text);font-weight:500}
.opt-chk{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);cursor:pointer;padding:2px 0}
.opt-chk input{accent-color:var(--accent)}
.opt-pts{display:flex;gap:6px;flex-wrap:wrap}
.pt-chk{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2);cursor:pointer}
.pt-chk input{accent-color:var(--accent)}
.table-wrap{flex:1;overflow-y:auto}
table.ptable{width:100%;border-collapse:collapse}
table.ptable thead th{padding:5px 10px;text-align:left;font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);background:var(--bg2);font-family:var(--mono);white-space:nowrap;position:sticky;top:0;z-index:1}
table.ptable thead th.r{text-align:right}
table.ptable tbody tr{border-bottom:1px solid var(--border);transition:background .08s}
table.ptable tbody tr:hover{background:var(--bg2)}
table.ptable td{padding:6px 10px;vertical-align:middle}
table.ptable td.desc{font-size:11px;max-width:280px;line-height:1.4}
table.ptable td.desc small{display:block;font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}
table.ptable td.qty{font-family:var(--mono);font-size:11px;text-align:right;color:var(--text2);white-space:nowrap}
table.ptable td.unit{font-family:var(--mono);font-size:10px;color:var(--text3);padding-left:3px;white-space:nowrap}
table.ptable td.price-cell{text-align:right;white-space:nowrap}
table.ptable td.total{font-family:var(--mono);font-size:11px;font-weight:500;text-align:right;white-space:nowrap}
table.ptable td.total.hl{color:var(--accent)}
.opt-badge{display:inline-block;padding:0 4px;border-radius:2px;font-size:8px;font-family:var(--mono);background:#e6f0ea;color:var(--accent2);border:1px solid #b8d4c4;vertical-align:middle;margin-left:4px}
.price-display{display:inline-flex;align-items:center;gap:3px;cursor:pointer;padding:2px 5px;border-radius:4px;border:1px solid transparent;transition:all .1s;font-family:var(--mono);font-size:11px;color:var(--text2)}
.price-display:hover{border-color:var(--border2);background:var(--bg4)}
.price-display.modified{color:var(--accent)}
.edit-icon{font-size:9px;color:var(--text3);opacity:0;transition:opacity .1s}
.price-display:hover .edit-icon{opacity:1}
.reset-btn{font-size:9px;color:var(--text3);cursor:pointer;padding:1px 2px;background:none;border:none;font-family:var(--mono);transition:color .1s}
.reset-btn:hover{color:var(--accent)}
.price-edit{display:inline-flex;align-items:center;gap:3px}
.price-edit input{width:66px;text-align:right;font-family:var(--mono);font-size:11px;padding:2px 4px;background:var(--bg4);border:1px solid var(--accent);border-radius:4px;color:var(--text);outline:none}
.price-edit button.ok{padding:2px 6px;font-size:9px;font-family:var(--mono);background:var(--accent);border:none;border-radius:4px;color:var(--bg);cursor:pointer;font-weight:500}
.price-edit button.cancel{padding:2px 6px;font-size:9px;font-family:var(--mono);background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text2);cursor:pointer}
.lot-footer{padding:8px 16px;border-top:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px}
.footer-meta{font-family:var(--mono);font-size:9px;color:var(--text3);line-height:1.7;flex:1}
.footer-marge{display:flex;align-items:center;gap:5px;flex-shrink:0}
.footer-marge label{font-size:9px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.footer-marge span{font-size:9px;color:var(--text3);font-family:var(--mono)}
.footer-total{text-align:right;flex-shrink:0}
.ft-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.ft-amount{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.02em}
.ft-marged{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:1px}
.ft-m2{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:1px}
.inactive-msg{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3);font-family:var(--mono);font-size:11px}
#summary{width:220px;min-width:220px;background:var(--bg2);border-left:1px solid var(--border);box-shadow:-2px 0 12px rgba(0,0,0,.07);display:flex;flex-direction:column;overflow:hidden;z-index:1}
/* ── Header ── */
.sum-header{padding:10px 13px 8px;border-bottom:1px solid var(--border)}
.sum-header h3{font-family:var(--mono);font-size:8px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.sum-actions{display:flex;flex-direction:column;gap:5px}
.sum-action{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;font-size:10px;font-family:var(--mono);background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;width:100%;text-align:left;transition:all .12s}
.sum-action:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.sum-action.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.sum-action.accent:hover{background:var(--accent2);border-color:var(--accent2)}
.sa-icon{font-size:11px;flex-shrink:0}
/* ── Grand total ── */
.sum-grand{padding:14px 13px 20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sg-block{padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.sg-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sg-label{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.sg-amount{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--accent);letter-spacing:-.01em;line-height:1}
.sg-ht-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px}
.sg-ttc-amount{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1;margin-top:3px}
.sg-tva-note{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:6px}
.sg-m2-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}
.sg-m2-cell{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.sg-m2-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);line-height:1}
.sg-m2-tag{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
/* ── Répartition ── */
.bars-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bar-row{display:grid;grid-template-columns:1fr auto;gap:2px 6px;margin-bottom:8px;align-items:center}
.bar-name{font-size:9px;color:var(--text2);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-pct{font-family:var(--mono);font-size:9px;color:var(--accent);text-align:right;font-weight:500}
.bar-bg{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;grid-column:1}
.bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s ease}
.bar-amt{font-family:var(--mono);font-size:8px;color:var(--text3);text-align:right}
input[type=number],select{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 6px;outline:none;transition:border-color .1s}
input[type=number]:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg3)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:5px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99}
#toast.show{opacity:1}
@media print{
  body{background:#fff;color:#000;overflow:visible;height:auto}
  #app{height:auto;flex-direction:column}
  #sidebar,#summary,.qual-cards,.hdr-btn,.lot-options,.footer-marge,.footer-meta{display:none}
  #main{overflow:visible}.table-wrap{overflow:visible}
  .lot-footer{background:#fff;border-top:1px solid #ccc;padding:6px 0}
  .ft-label,.ft-amount,.ft-m2,.ft-marged{color:#000}
  table.ptable thead th{background:#f4f4f4;color:#555}
  .price-display{color:#444;border:none;padding:0}.edit-icon,.reset-btn{display:none}
  td.total.hl{color:#3a6149}.opt-badge{border:1px solid #b8d4c4;background:#e6f0ea;color:#3a6149}
}
/* Quality cards */
.qual-cards{display:flex;gap:5px;flex-shrink:0}
.qcard{padding:4px 10px;border-radius:5px;border:1px solid var(--border);cursor:pointer;background:transparent;font-size:10px;color:var(--text2);text-align:center;transition:all .12s;line-height:1.35;font-family:var(--sans)}
.qcard:hover{border-color:var(--border2);color:var(--text)}
.qcard.active{border-color:var(--accent);background:rgba(77,122,96,.10);color:var(--accent)}
.qcard .qc-lbl{display:block;font-family:var(--mono);font-weight:500;font-size:10px}
.qcard .qc-sub{display:block;font-size:8px;color:inherit;opacity:.7;margin-top:1px;white-space:nowrap}
/* Material cards */
.matc-wrap{display:flex;flex-direction:column;gap:3px}
.matc-lbl{font-size:9px;color:var(--text2);font-family:var(--mono)}
.matc-row{display:flex;gap:4px;flex-wrap:wrap}
.matc{padding:3px 9px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;color:var(--text2);white-space:nowrap;transition:all .1s;background:transparent;font-family:var(--sans);line-height:1.4}
.matc:hover{border-color:var(--border2);color:var(--text)}
.matc.on{border-color:var(--accent);color:var(--accent);background:rgba(77,122,96,.09)}
.matc .ms{display:block;font-size:8px;opacity:.65;margin-top:1px}
/* Zone cards */
.zones-wrap{display:flex;flex-direction:column;gap:5px;width:100%}
.zone-card-n{border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .12s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.zone-card-n.zon{border-color:var(--border2)}
.zhead{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;user-select:none}
.zhead:hover{background:var(--bg3)}
.zsw{width:28px;height:16px;border-radius:8px;background:var(--bg4);border:1px solid var(--border2);position:relative;flex-shrink:0;transition:all .15s;pointer-events:none}
.zon .zsw{background:var(--accent);border-color:var(--accent)}
.zsw::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--text3);top:2px;left:2px;transition:transform .15s}
.zon .zsw::after{transform:translateX(12px);background:var(--bg)}
.zname{font-size:11px;color:var(--text2);flex:1;transition:color .12s}
.zon .zname{color:var(--text);font-weight:500}
.ztype{font-size:9px;color:var(--text3);font-family:var(--mono);margin-right:4px}
.zbody{display:none;padding:8px 10px 10px;border-top:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;gap:8px 14px}
.zon .zbody{display:flex}
/* Equip rows — compteur + variantes inline */
.eq-rows{display:flex;flex-direction:column;gap:6px;width:100%}
.eq-row{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg2);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.eq-head{display:flex;align-items:center;gap:8px;padding:7px 10px}
.eq-name{font-size:11px;color:var(--text);flex:1;font-weight:500}
.eq-qty{display:flex;align-items:center;gap:0;border:1px solid var(--border2);border-radius:4px;overflow:hidden;flex-shrink:0}
.eq-qty button{width:22px;height:22px;background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:14px;line-height:1;transition:background .1s}
.eq-qty button:hover{background:var(--bg4);color:var(--text)}
.eq-qty span{font-family:var(--mono);font-size:11px;min-width:22px;text-align:center;color:var(--text);line-height:22px}
.eq-variants{display:none;padding:6px 10px 8px;border-top:1px solid var(--border);background:var(--bg3);gap:4px;flex-wrap:wrap}
.eq-row.eq-on .eq-variants{display:flex}
.eq-var{padding:3px 9px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;color:var(--text2);white-space:nowrap;transition:all .1s;background:transparent;font-family:var(--sans)}
.eq-var:hover{border-color:var(--border2);color:var(--text)}
.eq-var.on{border-color:var(--accent);color:var(--accent);background:rgba(77,122,96,.09)}
/* Protection rows */
.prot-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.prot-row .pr-name{font-size:11px;color:var(--text);flex:1}
.prot-row .pr-qty{display:flex;align-items:center;gap:5px}
.prot-row .pr-qty label{font-size:9px;color:var(--text3);font-family:var(--mono)}
/* Équipement cuisine grid */
.appgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;width:100%}
.appcard{border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;transition:all .12s;background:var(--bg2);text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.appcard:hover{border-color:var(--border2)}
.appcard.on{border-color:var(--accent);background:rgba(77,122,96,.08)}
.appcard .ac-icon{font-size:16px;margin-bottom:3px}
.appcard .ac-name{font-size:10px;color:var(--text2)}
.appcard.on .ac-name{color:var(--accent)}
/* Tooltip */
.tip-wrap{display:inline-block;position:relative;margin-left:5px;vertical-align:middle}
.tip-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);color:var(--text3);font-size:8px;font-family:var(--mono);cursor:help;line-height:1;user-select:none;transition:border-color .1s}
.tip-icon:hover,.tip-icon:focus{border-color:var(--accent);color:var(--accent);outline:none}
.tip-bubble{display:none;position:absolute;left:0;bottom:calc(100% + 6px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:11px;font-family:var(--sans);line-height:1.5;padding:7px 10px;border-radius:5px;width:240px;z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.tip-bubble::after{content:'';position:absolute;top:100%;left:8px;border:5px solid transparent;border-top-color:var(--border2)}
.tip-wrap:hover .tip-bubble,.tip-wrap:focus-within .tip-bubble{display:block}
@media(max-width:600px){.tip-bubble{left:auto;right:0}}
</style>

function tipHtml(key){
  const tip=TIPS[key]||TIPS[key.replace(/_(?:std|mid|prm)$/,'')];
  if(!tip) return '';
  return`<span class="tip-wrap"><button class="tip-icon" tabindex="0" aria-label="Aide">?</button><span class="tip-bubble">${tip}</span></span>`;
}

function exportPDF(){
  const d=new Date().toLocaleDateString('fr-FR');
  const gt=gtot(),tva=gt*state.tva/100;
  const activeLots=LM.filter(m=>state.lots[m.id].on);
  let rows='';
  activeLots.forEach(m=>{
    const items=calcItems(m.id);
    if(!items.length) return;
    const lot=state.lots[m.id];
    const matHT=items.reduce((a,i)=>a+i.total,0);
    const avecM=matHT*(1+(lot.m||0)/100);
    rows+=`<div class="lot-block">
      <div class="lot-title">${m.label}<span class="lot-sub"> — ${m.sub}</span></div>
      <table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th><th>P.U. HT</th><th>Total HT</th></tr></thead><tbody>`;
    items.forEach(i=>{
      const qty=(i.qty||0)%1!==0?fmt(i.qty,1):fmt(i.qty,0);
      rows+=`<tr class="${i.hl?'hl':''}"><td>${i.lbl||''}${i.note?`<br><small>${i.note}</small>`:''}</td><td>${qty}</td><td>${i.unit||''}</td><td>${fmt(i.p,2)} €</td><td>${fmt(i.total,0)} €</td></tr>`;
    });
    rows+=`</tbody></table>
      <div class="lot-total">Total fournitures HT : <strong>${fmt(matHT,0)} €</strong>${lot.m>0?` · Avec marge ${lot.m}% : <strong>${fmt(avecM,0)} €</strong>`:''}</div>
    </div>`;
  });
  const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${state.projectName} — Estimateur BTP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#1a1a1a;background:#fff;padding:20px 24px}
    .doc-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;border-bottom:2px solid #1a1a1a;margin-bottom:20px}
    .doc-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
    .doc-meta{font-size:11px;color:#555;margin-top:4px}
    .doc-totals{text-align:right}
    .doc-totals .gt{font-size:18px;font-weight:700}
    .doc-totals .tva{font-size:11px;color:#555;margin-top:3px}
    .lot-block{margin-bottom:22px;page-break-inside:avoid}
    .lot-title{font-size:13px;font-weight:700;background:#f4f4f4;padding:6px 10px;border-left:3px solid #c8a96e;margin-bottom:0}
    .lot-sub{font-weight:400;color:#666;font-size:11px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#f9f9f9}
    th{padding:5px 8px;text-align:left;border-bottom:1px solid #ddd;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#555}
    td{padding:4px 8px;border-bottom:1px solid #eee;vertical-align:top}
    td:nth-child(2),td:nth-child(3),td:nth-child(4),td:nth-child(5){text-align:right;white-space:nowrap}
    th:nth-child(2),th:nth-child(3),th:nth-child(4),th:nth-child(5){text-align:right}
    tr.hl td:last-child{font-weight:600;color:#3a6149}
    small{display:block;color:#888;font-size:10px;margin-top:1px}
    .lot-total{text-align:right;padding:5px 8px;font-size:11px;background:#fafafa;border-top:1px solid #ddd}
    .doc-footer{margin-top:24px;padding-top:12px;border-top:2px solid #1a1a1a;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .footer-item{background:#f9f9f9;padding:10px 12px;border-radius:4px}
    .footer-item label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:4px}
    .footer-item .val{font-size:15px;font-weight:700}
    .footer-item .sub{font-size:10px;color:#666;margin-top:2px}
    @media print{body{padding:10px 14px}.lot-block{page-break-inside:avoid}}
  </style></head><body>
  <div class="doc-header">
    <div>
      <div class="doc-title">${state.projectName}</div>
      <div class="doc-meta">Estimateur BTP · Fournitures HT · Édité le ${d}</div>
      <div class="doc-meta" style="margin-top:2px">Surface habitable : ${fmt(state.globalSurf,0)} m² · TVA : ${state.tva}%</div>
    </div>
    <div class="doc-totals">
      <div class="gt">${fmt(gt,0)} € HT</div>
      ${state.tva>0?`<div class="tva">TVA ${state.tva}% : ${fmt(tva,0)} €<br><strong>${fmt(gt+tva,0)} € TTC</strong></div>`:''}
    </div>
  </div>
  ${rows}
  <div class="doc-footer">
    <div class="footer-item"><label>Total fournitures HT</label><div class="val">${fmt(gt,0)} €</div><div class="sub">${fmt(gt/state.globalSurf,0)} €/m²</div></div>

  </div>
  </body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}

function px(lid,key){const c=state.lots[lid].cp[key];return c!==undefined?c:BP[key]*(1+(state.globalCoeff||0)/100);}
function isMod(lid,key){return state.lots[lid].cp[key]!==undefined;}
function lsurf(lid){const s=state.lots[lid].surf;return s!==null?s:state.globalSurf;}
const REF_EPA={ragreage_simple:5,ragreage_fibre:8};
function pxRag(lid,key,epa){if(state.lots[lid].cp[key]!==undefined)return state.lots[lid].cp[key];return BP[key]*(epa/(REF_EPA[key]||5));}

function chuted(net,pct){return Math.round(net*(1+(parseFloat(pct)||0)/100)*10)/10;}

function calcItems(lid){
  const items=_calcItemsCore(lid);
  (state.lots[lid].custom||[]).forEach(c=>{
    const qty=parseFloat(c.qty)||0,p=parseFloat(c.p)||0;
    items.push({key:'_c_'+c.id,qty,lbl:c.lbl||'',unit:c.unit||'',note:'',p,total:qty*p,hl:false,custom:true,customId:c.id});
  });
  return items;
}
function _calcItemsCore(lid){
  const l=state.lots[lid],o=l.o,S=lsurf(lid);
  const row=(key,qty,lbl,unit,note)=>{const p=px(lid,key);return{key,qty,lbl,unit,note:note||'',p,total:qty*p,hl:false};};
  const hrow=(key,qty,lbl,unit,note)=>{const p=px(lid,key);return{key,qty,lbl,unit,note:note||'',p,total:qty*p,hl:true};};
  switch(lid){
    case'demolition':{
      const nb=parseInt(o.nb_bennes)||0;
      const items=[];

      if(o.poly_on&&(o.poly_m2>0)) items.push(row('polyane_200',o.poly_m2,`Film polyane 200µ — ${o.poly_m2} m²`,'m²','Protection sols et murs — rouleau 4×50 m'));

      if(o.kraft_on&&(o.kraft_m2>0)) items.push(row('papier_kraft',o.kraft_m2,`Papier kraft de protection — ${o.kraft_m2} m²`,'m²','Plans de travail / menuiseries / vitres'));
      return items;
    }
    case'iti':{
      const epa=o.epa,isGR=o.iso==='gr32';

      const R_gr={80:'2,50',100:'3,15',120:'3,75',140:'4,40',160:'5,00'};

      const isoLbl=isGR?`GR32 Kraft ${epa}mm — R=${R_gr[epa]||'?'} m².K/W`:`Steicoflex 036 ${epa}mm — R=${R_st[epa]||'?'} m².K/W`;
      const m2=parseFloat(o.m2)||0;
      const items=[
        row('iti_oss',m2,'Ossature Optima — lisses Clip\'Optima + fourrures 240','m²'),
        row('iti_appuis',m2,'Appuis intermédiaires Optima2','m²','1,5 pce/m²'),
        row(isoKey,m2,isoLbl,'m²',isGR?'Isover GR32 Kraft':'Steicoflex 036 — fibre de bois souple'),
      ];
      if(o.membrane){
        items.push(row('iti_vario',m2,'Membrane hygro-régulante Vario Xtra','m²','Frein-vapeur intelligent'));
        const sml=Math.round(m2*0.7);

        items.push(row('iti_pastilles',m2,'Pastilles Optima2 — maintien membrane','m²'));
      }

        const pk=`iti_${o.parement}`;
        items.push(row(pk,m2,o.parement==='ba13_std'?'Parement BA13 standard':'Parement BA13 hydrofuge','m²'));

function lmatHT(lid){if(!state.lots[lid].on)return 0;return calcItems(lid).reduce((a,i)=>a+i.total,0);}
function ltot(lid){return lmatHT(lid)*(1+(state.lots[lid].m||0)/100);}
function gtot(){return LM.reduce((a,m)=>a+ltot(m.id),0);}

function setLot(id){state.cur=id;state.editCell=null;render();}
function toggleLot(id){state.lots[id].on=!state.lots[id].on;render();}
function setTVA(v){state.tva=v;render();}
function toggleCorps(){state.corpView=!state.corpView;render();}

function setQuality(lid,q){
  state.lots[lid].q=q;
  const p=QP[lid]?.[q];
  if(!p) return render();
  if(lid==='plombs'){if(p.pts)state.lots.plombs.o.pts={...p.pts};['ce','wc_sol','wc_susp'].forEach(k=>{if(p[k]!==undefined)state.lots.plombs.o[k]=p[k];});}
  else Object.assign(state.lots[lid].o,p);
  render();
}

function setOpt(lid,k,v){
  // BUG FIX 1: Steicoflex max 140mm
  if(lid==='iti'&&k==='iso'&&v==='steico'&&!['60','80','100','120','140'].includes(state.lots.iti.o.epa)){
    state.lots.iti.o.epa='140';
  }
  // BUG FIX 2: ragréage type change → clear stale custom price lock
  if(lid==='ragreage'&&k==='type'&&state.lots[lid].o.type!==v){
    delete state.lots[lid].cp[state.lots[lid].o.type];
  }
  state.lots[lid].on=true;
  state.lots[lid].o[k]=v;
  render();
}
function setOptN(lid,par,k,v){state.lots[lid].on=true;state.lots[lid].o[par][k]=v;render();}
function setSurf(lid,v){state.lots[lid].on=true;state.lots[lid].surf=parseFloat(v)||1;render();}
function setGS(v){state.globalSurf=parseFloat(v)||0;render();}
function setMarge(lid,v){state.lots[lid].m=parseFloat(v)||0;render();}
function setProj(v){state.projectName=v;save();}

function addCustomLine(lid){
  if(!state.lots[lid].custom)state.lots[lid].custom=[];
  state.lots[lid].custom.push({id:'c'+Date.now(),lbl:'',unit:'',qty:0,p:0});
  state.lots[lid].on=true;
  render();
}
function removeCustomLine(lid,id){
  state.lots[lid].custom=(state.lots[lid].custom||[]).filter(c=>c.id!==id);
  render();
}
function setCustomLine(lid,id,field,value){
  const c=(state.lots[lid].custom||[]).find(c=>c.id===id);
  if(!c)return;
  if(field==='qty'||field==='p')c[field]=parseFloat(value)||0;
  else c[field]=value;
  render();
}
function liveCustomTotal(cid){
  const q=parseFloat(document.getElementById('cqty_'+cid)?.value)||0;
  const p=parseFloat(document.getElementById('cpri_'+cid)?.value)||0;
  const el=document.getElementById('ctot_'+cid);
  if(el)el.textContent=new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(q*p))+' €';
}

function startEdit(lid,key){state.editCell={lid,key};state.editVal=String(px(lid,key));render();requestAnimationFrame(()=>{const e=$('pei');if(e){e.focus();e.select();}});}
function commitEdit(){if(!state.editCell)return;const v=parseFloat(state.editVal.replace(',','.'));if(!isNaN(v)&&v>=0)state.lots[state.editCell.lid].cp[state.editCell.key]=v;state.editCell=null;render();}
function cancelEdit(){state.editCell=null;render();}
function rstPrice(lid,key){delete state.lots[lid].cp[key];state.editCell=null;render();}
function toggleTarifs(lid){state.lots[lid].tarifs_open=!state.lots[lid].tarifs_open;render();}
function toggleConfig(lid){state.lots[lid].config_collapsed=!state.lots[lid].config_collapsed;render();}
function setGlobalCoeff(v){state.globalCoeff=parseFloat(v)||0;var el=$('coeff-input');if(el)el.value=state.globalCoeff;render();}
function setPx(lid,key,v){const val=parseFloat(String(v).replace(',','.'));if(!isNaN(val)&&val>=0)state.lots[lid].cp[key]=val;render();}
function rstAllPrices(lid){state.lots[lid].cp={};render();}

function renderTarifs(lid){
  const items=calcItems(lid);
  const seen=new Set();
  const uniq=items.filter(i=>{if(!BP[i.key]||seen.has(i.key))return false;seen.add(i.key);return true;});
  if(!uniq.length) return'';
  const coeff=state.globalCoeff||0;
  const cleanLbl=s=>s.replace(/ — Zone \d+.*/,'').replace(/ — \d+ (unité|ml|m²|pce).*/,'').replace(/ × \d+.*/,'').trim();
  const anyMod=Object.keys(state.lots[lid].cp).some(k=>BP[k]!==undefined);
  const rows=uniq.map(i=>{
    const base=BP[i.key];
    const mod=isMod(lid,i.key);
    const effective=mod?state.lots[lid].cp[i.key]:base*(1+coeff/100);
    const lbl=cleanLbl(i.lbl||i.key);
    return`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:5px 10px;font-size:10px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lbl}</td>
      <td style="padding:5px 8px;font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right;white-space:nowrap">${fmt(base,2)} €</td>
      <td style="padding:5px 8px;text-align:right;white-space:nowrap"><input type="number" value="${+effective.toFixed(2)}" min="0" step="0.01" style="width:64px;text-align:right;font-family:var(--mono);font-size:10px;padding:2px 5px;background:var(--bg);border:1px solid ${mod?'var(--accent)':'var(--border2)'};border-radius:3px;color:var(--text);outline:none" onchange="setPx('${lid}','${i.key}',this.value)" onfocus="this.select()"></td>
      <td style="padding:5px 6px;text-align:center">${mod?`<button style="font-size:9px;color:var(--text3);cursor:pointer;padding:1px 4px;background:none;border:none;font-family:var(--mono)" onclick="rstPrice('${lid}','${i.key}')">↺</button>`:''}</td>
    </tr>`;
  }).join('');
  return`<div style="flex-shrink:0;border-top:2px solid var(--accent);background:var(--bg2);max-height:220px;overflow-y:auto">
    <div style="display:flex;align-items:center;padding:5px 10px;background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;gap:8px">
      <span style="font-family:var(--mono);font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;font-weight:500;flex:1">Tarifs du lot${coeff!==0?` · coeff. ${coeff>0?'+':''}${coeff}%`:''}${anyMod?' · <span style="color:var(--accent2)">prix modifiés</span>':''}</span>
      ${anyMod?`<button style="font-size:9px;font-family:var(--mono);color:var(--text3);background:transparent;border:1px solid var(--border2);border-radius:3px;padding:2px 7px;cursor:pointer" onclick="rstAllPrices('${lid}')">↺ Tout réinitialiser</button>`:''}
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:var(--bg3)">
        <th style="padding:4px 10px;font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:1px solid var(--border);font-weight:500">Désignation</th>
        <th style="padding:4px 8px;font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;text-align:right;border-bottom:1px solid var(--border);font-weight:500">Base BP</th>
        <th style="padding:4px 8px;font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;text-align:right;border-bottom:1px solid var(--border);font-weight:500">Prix unitaire HT</th>
        <th style="border-bottom:1px solid var(--border);width:24px"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function exportCSV(){
  const d=new Date().toLocaleDateString('fr-FR');
  let s=`Estimateur BTP — ${state.projectName} — ${d}\nLot;Total HT\n`;
  LM.forEach(m=>{if(state.lots[m.id].on)s+=`${m.label};${fmt(ltot(m.id),2).replace(/\u202f/g,'').replace(',','.')}\n`;});
  const gt=gtot(),tva=gt*state.tva/100;
  s+=`\nTotal HT;${fmt(gt,2).replace(/\u202f/g,'').replace(',','.')}\n`;
  if(state.tva>0){s+=`TVA ${state.tva}%;${fmt(tva,2).replace(/\u202f/g,'').replace(',','.')}\nTotal TTC;${fmt(gt+tva,2).replace(/\u202f/g,'').replace(',','.')}\n`;}
  navigator.clipboard.writeText(s).then(()=>toast('Résumé CSV copié')).catch(()=>toast('Erreur copie'));
}

function exportShoppingList(){
  const d=new Date().toLocaleDateString('fr-FR');
  const activeLots=LM.filter(m=>state.lots[m.id].on);
  function packFor(key){return PACK[key]||{factor:1,packQty:1,packLabel:'unité'};}
  function fmtN(n){return n%1===0?n:+n.toFixed(1);}
  function row(hl,lbl,note,besoin,cond,achat){
    return`<tr class="${hl?'hl':''}"><td>${lbl}${note?`<br><small>${note}</small>`:''}</td><td class="r">${besoin}</td><td>${cond}</td><td class="r nb">${achat}</td></tr>`;
  }

  let sections='';
  let hasCarrNote=false;

  activeLots.forEach(m=>{
    const items=calcItems(m.id);
    if(!items.length) return;
    let rows='';
    let hasHidden=false;

    items.forEach(i=>{
      if(!i.qty||i.qty<=0) return;
      const p=packFor(i.key);

      // Appareillage global masqué
      if(p.hideInShop){hasHidden=true;return;}

      // Multi-lignes (ICTA, plomberie…)
      if(p.shopItems){
        p.shopItems.forEach(si=>{
          const nb=Math.ceil(i.qty*si.factor/si.packQty);
          if(nb>0) rows+=row(i.hl,si.label,i.lbl,`~${fmtN(i.qty*si.factor)} ml`,si.packLabel,nb);
        });
        return;
      }

      // Peinture en litres
      if(p.showL){
        const L=Math.ceil(i.qty*p.lPerQty);
        rows+=row(i.hl,i.lbl||i.key,i.note||null,`${fmtN(i.qty)} ${i.unit||''}`.trim(),p.packLabel,`~${L} L`);
        return;
      }

      // Ragréage : sacs selon épaisseur réelle
      let nb;
      if((i.key==='ragreage_simple'||i.key==='ragreage_fibre')&&i.epa!=null){
        nb=Math.ceil(i.qty*i.epa*(i.key==='ragreage_fibre'?1.75:1.8)/25);
      } else {
        nb=Math.ceil(i.qty*(p.factor||1)/p.packQty);
      }
      if(nb<=0) return;

      const qtyDisp=`${fmtN(i.qty)} ${i.unit||''}`.trim();
      const isKit=p.packQty===1&&/kit|forfait/.test(p.packLabel||'');
      let achat=isKit?qtyDisp:`${nb}`;
      if(p.packNote){achat+=`<sup style="color:#aa7700">†</sup>`;hasCarrNote=true;}

      rows+=row(i.hl,i.lbl||i.key,i.note||null,qtyDisp,p.packLabel,achat);
    });

    if(hasHidden){
      rows+=`<tr><td colspan="4" style="font-size:10px;color:#888;padding:6px 8px;font-style:italic">Appareillage électrique (prises, inter, DCL…) : activer le détail dans le devis pour obtenir les quantités pièce par pièce.</td></tr>`;
    }
    if(!rows) return;

    sections+=`<div class="lot-block">
      <div class="lot-title">${m.label}<span class="lot-sub"> — ${m.sub}</span></div>
      <table>
        <thead><tr><th>Désignation</th><th class="r">Besoin</th><th>Conditionnement</th><th class="r">À acheter</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  const carrNote=hasCarrNote
    ?`<p style="margin-top:6px;font-size:10px">† Nombre indicatif calculé pour un format standard (ex. 40×60 cm). Recalculez selon le format exact de votre carrelage ou faïence.</p>`
    :'';

  const html=`<!DOCTYPE html><html lang="fr"><head>
  <meta charset="UTF-8"><title>${state.projectName} — Liste d'achat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#1a1a1a;background:#fff;padding:20px 24px}
    .doc-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;border-bottom:2px solid #1a1a1a;margin-bottom:20px}
    .doc-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
    .doc-meta{font-size:11px;color:#555;margin-top:4px}
    .doc-actions{margin-bottom:14px;text-align:right}
    .doc-actions button{font-size:11px;padding:5px 14px;background:#3a6149;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit}
    .lot-block{margin-bottom:24px;page-break-inside:avoid}
    .lot-title{font-size:13px;font-weight:700;background:#f4f4f4;padding:6px 10px;border-left:3px solid #4d7a60;margin-bottom:0}
    .lot-sub{font-weight:400;color:#666;font-size:11px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#f9f9f9}
    th{padding:5px 8px;text-align:left;border-bottom:2px solid #ddd;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#555}
    th.r{text-align:right}
    td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:top}
    td.r{text-align:right;white-space:nowrap}
    td.nb{font-size:15px;font-weight:700;color:#3a6149;white-space:nowrap}
    small{display:block;color:#888;font-size:10px;margin-top:1px}
    tr.hl td{background:#f0f7f3}
    .note{margin-top:20px;padding:10px 14px;background:#fffbee;border:1px solid #ddc060;border-radius:4px;font-size:11px;color:#665500;line-height:1.6}
    @media print{body{padding:10px 14px}.lot-block{page-break-inside:avoid}.doc-actions{display:none}}
  </style>
  </head><body>
  <div class="doc-actions"><button onclick="window.print()">Imprimer / PDF</button></div>
  <div class="doc-header"><div>
    <div class="doc-title">${state.projectName}</div>
    <div class="doc-meta">Liste d'achat — Fournitures BTP · Éditée le ${d}</div>
    <div class="doc-meta" style="margin-top:2px">Surface habitable : ${fmt(state.globalSurf,0)} m²</div>
  </div></div>
  ${sections}
  <div class="note">⚠ Quantités arrondies au conditionnement supérieur. Vérifiez les dosages fabricants avant commande, notamment pour les ragréages (épaisseur réelle), peintures (absorbance du support) et colles carrelage (format des carreaux).${carrNote}</div>
  </body></html>`;

  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
}

function copyLot(lid){
  const items=calcItems(lid),S=lsurf(lid),d=new Date().toLocaleDateString('fr-FR');
  const meta=LM.find(m=>m.id===lid);
  let txt=`${meta.label} — ${state.projectName} — ${d}\n${'─'.repeat(64)}\n`;
  items.forEach(i=>txt+=`${(i.lbl||i.label||'').padEnd(44)} ${fmt(i.qty,1).padStart(7)} ${(i.unit||'').padEnd(5)} × ${fmt(i.p,2)} € = ${fmt(i.total,0)} €\n`);
  const sub=items.reduce((a,i)=>a+i.total,0);
  txt+=`${'─'.repeat(64)}\nTotal HT : ${fmt(sub,0)} €  (${fmt(sub/S,0)} €/m²)\n`;
  navigator.clipboard.writeText(txt).then(()=>toast('Lot copié')).catch(()=>toast('Erreur'));
}

function renderOpts(lid){

  const seg=(k,ch,lbl)=>`<div class="opt-group"><label>${lbl}</label><div class="mini-seg">${ch.map(([v,t])=>`<button class="${o[k]===v?'on':''}" onclick="setOpt('${lid}','${k}','${v}')">${t}</button>`).join('')}</div></div>`;

function renderTable(lid){
  const items=calcItems(lid),S=lsurf(lid);
  const matHT=items.reduce((a,i)=>a+i.total,0);
  const marge=state.lots[lid].m||0;
  const avecM=matHT*(1+marge/100);
  const pm2=S>0?avecM/S:0;
  const inS=(type,val,ph,w,onch)=>`<input type="${type}" value="${val}" placeholder="${ph}" style="width:${w};background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:${type==='number'?'var(--mono)':'var(--sans)'};font-size:11px;padding:1px 2px;outline:none;text-align:${type==='number'?'right':'left'}" onchange="${onch}" onfocus="this.select()">`;
  const rows=items.map(item=>{
    if(item.custom){
      const cid=item.customId;
      const UNITS=['m²','ml','kg','pce','forfait','m³','L','h'];
      const unitSel=`<select onchange="setCustomLine('${lid}','${cid}','unit',this.value)" style="padding:2px 3px;font-size:10px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border2);border-radius:3px;color:var(--text);width:58px">${UNITS.map(u=>`<option value="${u}"${item.unit===u?' selected':''}>${u}</option>`).join('')}</select>`;
      const qtyInp=`<input id="cqty_${cid}" type="number" value="${item.qty}" min="0" step="0.1" style="width:52px;text-align:right;font-family:var(--mono);font-size:11px;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);outline:none;padding:1px 2px" oninput="liveCustomTotal('${cid}')" onchange="setCustomLine('${lid}','${cid}','qty',this.value)" onfocus="this.select()">`;
      const priInp=`<input id="cpri_${cid}" type="number" value="${item.p}" min="0" step="0.01" style="width:58px;text-align:right;font-family:var(--mono);font-size:11px;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);outline:none;padding:1px 2px" oninput="liveCustomTotal('${cid}')" onchange="setCustomLine('${lid}','${cid}','p',this.value)" onfocus="this.select()"> €`;
      return`<tr style="background:rgba(77,122,96,.04)">
        <td class="desc">${inS('text',item.lbl.replace(/"/g,'&quot;'),'Désignation…','100%',`setCustomLine('${lid}','${cid}','lbl',this.value)`)}</td>
        <td class="qty">${qtyInp}</td>
        <td class="unit">${unitSel}</td>
        <td class="price-cell">${priInp}</td>
        <td class="total" id="ctot_${cid}" style="white-space:nowrap">${fmt(item.total,0)} € <button onclick="removeCustomLine('${lid}','${cid}')" title="Supprimer" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 4px;vertical-align:middle;font-family:var(--mono)" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button></td>
      </tr>`;
    }
    const isEd=state.editCell&&state.editCell.lid===lid&&state.editCell.key===item.key;
    const mod=isMod(lid,item.key);
    const qty=(item.qty||0)%1!==0?fmt(item.qty,1):fmt(item.qty,0);
    const lbl=item.lbl||item.label||'';
    let pCell;
    if(isEd){
      pCell=`<div class="price-edit"><input id="pei" type="number" value="${state.editVal}" step="0.01" min="0" onkeydown="if(event.key==='Enter')commitEdit();if(event.key==='Escape')cancelEdit()" oninput="state.editVal=this.value"><button class="ok" onclick="commitEdit()">✓</button><button class="cancel" onclick="cancelEdit()">✕</button>${mod?`<button class="reset-btn" onclick="rstPrice('${lid}','${item.key}')">↺</button>`:''}</div>`;
    } else {
      pCell=`<span class="price-display${mod?' modified':''}" onclick="startEdit('${lid}','${item.key}')">${fmt(item.p,2)} €<span class="edit-icon">✎</span>${mod?`<button class="reset-btn" onclick="event.stopPropagation();rstPrice('${lid}','${item.key}')">↺</button>`:''}</span>`;
    }
    return`<tr><td class="desc">${lbl}${tipHtml(item.key)}${item.note?`<small>${item.note}</small>`:''}${mod?'<span class="opt-badge">modifié</span>':''}</td><td class="qty">${qty}</td><td class="unit">${item.unit||''}</td><td class="price-cell">${pCell}</td><td class="total${item.hl?' hl':''}">${fmt(item.total,0)} €</td></tr>`;
  }).join('');
  const addRow=`<tr><td colspan="5" style="padding:6px 10px"><button onclick="addCustomLine('${lid}')" style="font-size:9px;font-family:var(--mono);color:var(--accent);background:transparent;border:1px dashed var(--accent);border-radius:4px;padding:3px 10px;cursor:pointer;opacity:.7;transition:opacity .12s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity='.7'">+ Ajouter une ligne</button></td></tr>`;
  const margeHtml=marge>0?`<div class="ft-marged">Avec marge ${marge}% : ${fmt(avecM,0)} €</div>`:'';
  return`<div class="table-wrap"><table class="ptable"><thead><tr><th>Désignation</th><th class="r">Qté</th><th class="r">Unité</th><th class="r">Prix unit. HT</th><th class="r">Total HT</th></tr></thead><tbody>${rows}${addRow}</tbody></table></div>
  <div class="lot-footer"><div class="footer-meta">Surface : ${fmt(S,0)} m² · ${items.length} lignes<br>Clic prix pour modifier · ↺ réinitialiser</div><div class="footer-marge"><label>Marge</label><input type="number" value="${marge}" min="0" max="100" step="0.5" style="width:44px;text-align:right" onchange="setMarge('${lid}',this.value)"><span>%</span></div><div class="footer-total"><div class="ft-label">Total matériaux HT</div><div class="ft-amount">${fmt(matHT,0)} €</div>${margeHtml}<div class="ft-m2">${fmt(pm2,0)} €/m² · base ${fmt(S,0)} m²</div></div></div>`;
}

function renderSummary(){
  const gt=gtot(),gs=state.globalSurf||1,tvaAmt=gt*state.tva/100;

  const nLots=LM.filter(m=>state.lots[m.id].on).length;

  // Bloc 1 — HT + TTC fusionnés
  const htBlock=`<div class="sg-block">
    <div class="sg-label">Total HT</div>
    <div class="sg-amount">${fmt(gt,0)} €</div>
    <div class="sg-ht-sub">${nLots} lot${nLots>1?'s':''} actif${nLots>1?'s':''}</div>
    ${state.tva>0?`<div class="sg-label" style="margin-top:12px">Total TTC</div>
    <div class="sg-ttc-amount">${fmt(gt+tvaAmt,0)} €</div>
    <div class="sg-tva-note">dont TVA ${state.tva}% · ${fmt(tvaAmt,0)} €</div>`:''}
  </div>`;

  // Bloc 2 — Prix au m² (même hiérarchie, plus petit)
  const m2Block=`<div class="sg-block">
    <div class="sg-label">Prix au m²</div>
    <div style="font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent);line-height:1;margin-top:4px">${fmt(gt/gs,0)} €</div>
    <div style="font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px${state.tva>0?';margin-bottom:8px':''}">HT / m²</div>
    ${state.tva>0?`<div style="font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1">${fmt((gt+tvaAmt)/gs,0)} €</div>
    <div style="font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">TTC / m²</div>`:''}
  </div>`;

  // Bloc 4 — Répartition
  const activeLots=LM.filter(m=>state.lots[m.id].on&&ltot(m.id)>0);
  const amax=Math.max(...activeLots.map(m=>ltot(m.id)),1);
  const bars=activeLots.map(m=>{
    const t=ltot(m.id),pct=Math.round(t/amax*100),pgt=gt>0?Math.round(t/gt*100):0;
    const n=m.label.length>14?m.label.slice(0,13)+'…':m.label;
    return`<div class="bar-row">
      <span class="bar-name">${n}</span><span class="bar-pct">${pgt}%</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="bar-amt">${fmt(t,0)} €</span>
    </div>`;
  }).join('');
  const barsBlock=bars?`<div class="sg-block"><div class="sg-label">Répartition</div>${bars}</div>`:'';

  $('sum-grand').innerHTML=htBlock+m2Block+barsBlock;

  ['0','10','20'].forEach(v=>{const el=$(`tva${v}`);if(el)el.className=state.tva===parseInt(v)?'on':'';});
}

function render(){
  const lid=state.cur,l=state.lots[lid],meta=LM.find(m=>m.id===lid),S=lsurf(lid);
  const noSurf=['demolition','iti','cloisons','peinture','etancheite','parquet','carrelage','faience','ragreage','menus','menuext','cuisine'];
  const surfCtrl=noSurf.includes(lid)?'':
    `<div class="surf-group"><label>Surface</label><input type="number" value="${S}" min="1" max="9999" style="width:54px;text-align:right" onchange="setSurf('${lid}',this.value)"><span>m²</span></div>`;
  const QLABELS={std:'Éco',mid:'Standard',prm:'Premium'};
  const lotsAvecGamme=['elec','cuisine','menus','menuext','plombs'];
  const qCards=lotsAvecGamme.includes(lid)?['std','mid','prm'].map(q=>`<button class="qcard${l.q===q?' active':''}" onclick="setQuality('${lid}','${q}')"><span class="qc-lbl">${QLABELS[q]}</span></button>`).join(''):'';
  $('lot-view').innerHTML=`
    <div class="lot-header">
      <div class="lot-sw-wrap${l.on?'':' off'}" onclick="toggleLot('${lid}')">
        <div class="lot-sw${l.on?' on':''}"></div>
        <div class="lot-title"><h2>${meta.label}</h2><p>${meta.sub}</p></div>
      </div>
      ${surfCtrl}
      ${qCards?`<div class="qual-cards">${qCards}</div>`:''}
      <button class="hdr-btn${l.tarifs_open?' active-lot':''}" onclick="toggleTarifs('${lid}')">⚙ Modifier tarifs</button>
    </div>
    <div class="config-box${l.config_collapsed?' collapsed':''}">
      <div class="config-head" onclick="toggleConfig('${lid}')">
        <span class="ch-chevron">▾</span>
        <span class="ch-title">Configurer ${(meta.label||'').toLowerCase()}</span>
        ${l.config_collapsed?'<span class="ch-hint">Replié — cliquer pour modifier</span>':''}
      </div>
      <div class="lot-options">${renderOpts(lid)}</div>
    </div>
    ${l.tarifs_open?renderTarifs(lid):''}
    ${l.on?renderTable(lid):'<div class="inactive-msg">Lot désactivé — utiliser le commutateur en haut à gauche pour l\'activer</div>'}`;

  $('nav-lots').innerHTML=LM.map((m,i)=>{
    const t=ltot(m.id),on=state.lots[m.id].on,n=i<9?`0${i+1}`:`${i+1}`;
    return`<div class="nav-item${state.cur===m.id?' active':''}${!on?' disabled':''}" onclick="setLot('${m.id}')"><span class="nav-num">${n}</span><div class="nav-info"><div class="nav-label">${m.label}</div><div class="nav-sub">${m.sub}</div></div><div class="nav-amount">${on?fmt(t,0)+' €':'—'}</div></div>`;
  }).join('');

  renderSummary();
  save();
}

let _rArmed=false,_rTimer=null;
function resetProject(){
  var btn=document.getElementById('reset-btn');
  if(!_rArmed){
    _rArmed=true;
    btn.textContent='\u26a0 Cliquer \xe0 nouveau pour confirmer';
    btn.style.color='#b05050';
    btn.style.borderColor='#b05050';
    clearTimeout(_rTimer);
    _rTimer=setTimeout(function(){
      _rArmed=false;
      btn.textContent='\u21ba R\xe9initialiser le projet';
      btn.style.color='';btn.style.borderColor='';
    },5000);
    return;
  }
  clearTimeout(_rTimer);
  _rArmed=false;
  state.projectName='';
  state.globalSurf=0;
  state.tva=0;
  state.globalCoeff=0;
  state.corpView=false;
  state.editCell=null;
  state.editVal='';
  state.cur=Object.keys(state.lots)[0]||'demolition';
  Object.keys(state.lots).forEach(function(id){
    var lot=state.lots[id];
    lot.on=false;
    lot.cp={};
    lot.m=0;
    lot.surf=null;
    lot.q='std';
    lot.custom=[];
    lot.o=JSON.parse(JSON.stringify(lot.o),function(_,v){
      if(typeof v==='number')return 0;
      if(typeof v==='boolean')return false;
      return v;
    });
  });
  function setVal(id,v){var el=document.getElementById(id);if(el)el.value=v;}
  setVal('gs-input','');
  setVal('proj-input','');
  try{localStorage.removeItem('btp_v9');}catch(e){}
  btn.textContent='\u21ba R\xe9initialiser le projet';
  btn.style.color='';btn.style.borderColor='';
  render();
  toast('Projet r\xe9initialis\xe9');
}
function save(){try{localStorage.setItem('btp_v9',JSON.stringify({projectName:state.projectName,globalSurf:state.globalSurf,tva:state.tva,corpView:state.corpView,globalCoeff:state.globalCoeff,lots:state.lots}));}catch(e){}}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('btp_v9')||'null');
    if(!s)return;
    if(s.projectName)state.projectName=s.projectName;
    if(s.globalSurf)state.globalSurf=s.globalSurf;
    if(s.tva!==undefined)state.tva=s.tva;
    if(s.corpView!==undefined)state.corpView=s.corpView;
    if(s.globalCoeff!==undefined)state.globalCoeff=s.globalCoeff;
    if(s.lots)Object.entries(s.lots).forEach(([id,sl])=>{
      if(!state.lots[id])return;
      Object.assign(state.lots[id],sl);
      // Migration : pts booleans → integers (compatibilité sessions antérieures)
      if(id==='plombs'&&state.lots.plombs.o.pts){
        const pts=state.lots.plombs.o.pts;
        Object.keys(pts).forEach(k=>{if(typeof pts[k]==='boolean')pts[k]=pts[k]?1:0;});
        // Migration : wc_type + pts.wc → wc_sol / wc_susp
        if(state.lots.plombs.o.wc_sol===undefined){
          const tot=pts.wc||0;
          const was_susp=(state.lots.plombs.o.wc_type||'sol')==='suspendu';
          state.lots.plombs.o.wc_sol=was_susp?0:tot;
          state.lots.plombs.o.wc_susp=was_susp?tot:0;
        }
      }
    });
  }catch(e){}
}

load();
$('gs-input').value=state.globalSurf;
$('proj-input').value=state.projectName;
$('gs-input').addEventListener('change',function(){setGS(this.value);});
$('proj-input').addEventListener('change',function(){setProj(this.value);});
render();
</script>
</body>
</html>
